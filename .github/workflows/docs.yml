name: Documentation
on:
  pull_request:
    paths:
      - 'docs/**'
      - zensical.toml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: 3.x
      - run: pip install zensical
      - run: zensical build --clean
