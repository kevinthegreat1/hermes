name: Grafana Release

on:
  push:
    tags:
      - 'grafana-v*'

permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: nasa-hermes-datasource

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version-file: nasa-hermes-datasource/go.mod

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: mage -v BuildAll

      - name: Package plugin
        working-directory: .
        run: |
          VERSION=${GITHUB_REF_NAME#grafana-v}
          mkdir -p pkg
          mv nasa-hermes-datasource/dist pkg/nasa-hermes-datasource
          cd pkg
          zip -r ../nasa-hermes-datasource-${VERSION}.zip nasa-hermes-datasource/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Grafana Plugin ${{ github.ref_name }}"
          files: nasa-hermes-datasource-*.zip
          generate_release_notes: true
