name: Grafana Bundle Stats

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'grafana-datasource-plugin/**'
  push:
    branches:
      - main
    paths:
      - 'grafana-datasource-plugin/**'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./grafana-datasource-plugin/package-lock.json

      - name: Install plugin dependencies
        working-directory: ./grafana-datasource-plugin
        run: npm ci

      - uses: grafana/plugin-actions/bundle-size@bundle-size/v1.0.2
        with:
          working-directory: ./grafana-datasource-plugin
