name: Grafana Bundle Stats

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'nasa-hermes-datasource/**'
  push:
    branches:
      - main
    paths:
      - 'nasa-hermes-datasource/**'

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/bundle-size@bundle-size/v1.0.2
        with:
          working-directory: ./nasa-hermes-datasource
